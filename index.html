<title>今日安排</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#1a3c6e;--red:#c0504d;--orange:#e36c09;--blue:#2b579a;--purple:#7030a0;--green:#548235;--border:#e5e5ea;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:14px}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--sub:#98989d;--border:#38383a;--shadow:0 1px 3px rgba(0,0,0,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 14px 50px;-webkit-font-smoothing:antialiased;max-width:500px;margin:0 auto}
.header{text-align:center;padding:16px 0 8px}
.header .date{font-size:12px;color:var(--sub);font-weight:500;letter-spacing:.5px}
.header h1{font-size:26px;font-weight:700;margin-top:3px;letter-spacing:-.5px}
.day-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px}
.badge-training{background:#e8f0fe;color:var(--blue)}
.badge-rest{background:#e8f5e9;color:var(--green)}
.badge-fullrest{background:#fce4ec;color:#c62828}
@media(prefers-color-scheme:dark){.badge-training{background:#1a3c6e33;color:#7aa2f7}.badge-rest{background:#2e4a2e33;color:#81c784}.badge-fullrest{background:#4a1a1a33;color:#ef9a9a}}

/* Day nav */
.dnav{display:flex;gap:3px;overflow-x:auto;padding:8px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:center}
.dnav::-webkit-scrollbar{display:none}
.dnav button{flex:0 0 auto;padding:7px 12px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.dnav button.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* Tab buttons */
.tabs{display:flex;gap:6px;padding:0 0 14px;justify-content:center}
.tabs button{flex:1;max-width:90px;padding:10px 8px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tabs button .t-icon{font-size:18px}
.tabs button.active{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(26,60,110,.25)}
.tabs button.active .t-icon{filter:brightness(2)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* Timeline */
.tl{position:relative;padding-left:14px}
.tl::before{content:'';position:absolute;left:0;top:3px;bottom:3px;width:2px;background:var(--border);border-radius:1px}
.ti{position:relative;padding:0 0 10px 14px}
.ti:last-child{padding-bottom:0}
.ti::before{content:'';position:absolute;left:-19px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tt{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:1px}
.ta{font-size:13px;font-weight:500}
.tn{font-size:11px;color:var(--sub);margin-top:1px}

/* Exercise */
.ex{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.ex:last-child{border-bottom:none}
.exn{font-size:13px;font-weight:500;flex:1}
.exs{font-size:12px;color:var(--accent);font-weight:600;white-space:nowrap;margin-left:8px}
.exnote{font-size:11px;color:var(--sub);margin-top:1px}

/* Meal */
.meal{padding:9px 0;border-bottom:1px solid var(--border)}
.meal:last-child{border-bottom:none}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mn{font-size:13px;font-weight:600}
.mt{font-size:11px;color:var(--sub)}
.mo{font-size:12px;color:var(--text);line-height:1.5}
.ml{font-size:10px;color:var(--green);font-weight:500;margin-left:5px}

/* Rehab checkboxes */
.rh{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.rh:last-child{border-bottom:none}
.rh input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);flex-shrink:0}
.rh label{font-size:13px;cursor:pointer;line-height:1.4}

/* Study blocks */
.sb{padding:8px 10px;border-radius:8px;margin-bottom:5px;background:#f0f4ff}
.sbs{font-size:13px;font-weight:600}
.sbt{font-size:11px;color:var(--sub);margin-top:1px}
.sbp{font-size:10px;color:var(--blue);margin-top:1px;font-style:italic}
@media(prefers-color-scheme:dark){.sb{background:#1a2a4a33}}

/* Tips */
.tips{font-size:11px;color:var(--sub);line-height:1.5;padding:9px 12px;border-radius:8px;background:#fff9e6}
.tips strong{color:var(--orange)}
@media(prefers-color-scheme:dark){.tips{background:#2a2410}}

/* Grocery */
.grocery-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.grocery-table td,.grocery-table th{padding:6px 8px;border-bottom:1px solid var(--border);text-align:left}
.grocery-table th{font-size:11px;color:var(--sub);font-weight:600;background:var(--bg)}
.grocery-table .cat{background:#f0f4ff;font-weight:600;font-size:12px}
@media(prefers-color-scheme:dark){.grocery-table .cat{background:#1a2a4a33}}

.sep{padding:5px 0;font-size:11px;color:var(--sub);font-weight:600;margin-top:3px}
.cn{font-size:11px;color:var(--sub);text-align:center;margin-top:14px;padding:10px;border-radius:8px;background:var(--card)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px}
.tag-math{background:#e3f2fd;color:#1565c0}
.tag-eng{background:#fce4ec;color:#c62828}
.tag-408{background:#e8f5e9;color:#2e7d32}
.tag-pol{background:#fff3e0;color:#e65100}
@media(prefers-color-scheme:dark){.tag-math{background:#0d47a133}.tag-eng{background:#b71c1c33}.tag-408{background:#1b5e2033}.tag-pol{background:#e6510033}}

.hidden{display:none!important}
</style>
</head>

// ===================== RENDER =====================
function getTodayKey(){
  const m={0:'sun',1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat'};
  return m[new Date().getDay()];
}
function fmtDate(){
  return new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
function nav(key){
  document.getElementById('dn').innerHTML = DAYS.map(k=>
    `<button class="${k===key?'active':''}" onclick="sw('${k}')">${D[k].name}</button>`
  ).join('');
}
function sw(key){render(key);window.scrollTo({top:0,behavior:'smooth'})}

let currentKey = null;
function showTab(tab){
  const sections = {sch:'s-sch',meals:'s-meals',tr:'s-tr',rehab:'s-rehab',grocery:'s-grocery'};
  Object.entries(sections).forEach(([k,id])=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('hidden', k!==tab);
  });
  // Update tab buttons
  document.querySelectorAll('.tabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  // Special: show grocery only in 饮食 tab, alongside meals
  const ge = document.getElementById('s-grocery');
  if(ge) ge.classList.toggle('hidden', tab!=='meals');
}

function render(key){
  currentKey = key;
  const d = D[key];
  document.getElementById('dd').textContent = fmtDate();
  document.getElementById('dt').textContent = d.title;
  document.getElementById('db').innerHTML = `<span class="day-badge ${d.bc}">${d.badge}</span>`;
  nav(key);

  // Determine which tabs to show
  const hasTr = !!d.tr;
  const tabsHTML = `
    <button class="active" data-tab="sch" onclick="showTab('sch')"><span class="t-icon">⏰</span>时间表</button>
    <button data-tab="meals" onclick="showTab('meals')"><span class="t-icon">🍱</span>饮食</button>
    ${hasTr ? `<button data-tab="tr" onclick="showTab('tr')"><span class="t-icon">🏋️</span>训练</button>` : ''}
    <button data-tab="rehab" onclick="showTab('rehab')"><span class="t-icon">🩺</span>注意</button>
  `;
  document.getElementById('tabs').innerHTML = tabsHTML;

  let html = '';

  // === 时间表 ===
  html += `<div id="s-sch"><div class="card"><h3>⏰ 今日时间表</h3><div class="tl">`;
  d.sch.forEach(s=>{
    html += `<div class="ti"><div class="tt">${s.t}</div><div class="ta">${s.a}</div>${s.n?`<div class="tn">${s.n}</div>`:''}</div>`;
  });
  html += `</div></div>`;

  // Study
  if(d.study){
    html += `<div class="card"><h3>📚 数二+英二+408 学习计划</h3>`;
    d.study.forEach(s=>{
      const tags = s.tags ? s.tags.split(' ').map(t=>{
        const labels={math:'数二',eng:'英二','408':'408',pol:'政治'};
        return `<span class="tag tag-${t}">${labels[t]||t}</span>`;
      }).join('') : '';
      html += `<div class="sb"><div class="sbs">${tags} ${s.sub}</div><div class="sbt">${s.time}</div>${s.tip?`<div class="sbp">${s.tip}</div>`:''}</div>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // close s-sch

  // === 饮食 ===
  html += `<div id="s-meals" class="hidden"><div class="card"><h3>🍱 今日饮食</h3>`;
  d.meals.forEach(m=>{
    const locTag = m.loc ? `<span class="ml">@${m.loc}</span>` : '';
    html += `<div class="meal"><div class="mh"><span class="mn">${m.name}${locTag}</span><span class="mt">${m.time} · ${m.kcal}</span></div><div class="mo">${m.options}</div></div>`;
  });
  html += `</div>`;

  // Weekly grocery (only shown on Sunday)
  if(key==='sun'){
  html += `<div id="s-grocery" class="card"><h3>🛒 一周采购清单（周日备餐用）</h3>`;
  html += `<table class="grocery-table">`;
  GROCERY.forEach(cat=>{
    html += `<tr><td class="cat" colspan="3">${cat.cat}</td></tr>`;
    cat.items.forEach((item,i)=>{
      html += `<tr><td>${item[0]}</td><td style="white-space:nowrap;color:var(--accent);font-weight:600">${item[1]}</td><td style="font-size:11px;color:var(--sub)">${item[2]}</td></tr>`;
    });
  });
  html += `</table>`;
  html += `<div style="font-size:11px;color:var(--sub);text-align:center;margin-top:8px">💰 预估总花费 ¥300-440/周 · 日均¥43-63</div>`;
  html += `</div>`;
  } // end sunday-only grocery
  html += `</div>`; // close s-grocery + s-meals

  // === 训练 ===
  if(d.tr){
    html += `<div id="s-tr" class="hidden"><div class="card"><h3>🏋️ ${d.tr.title}</h3>`;
    d.tr.ex.forEach(ex=>{
      if(ex.n.startsWith('--')){
        html += `<div class="sep">${ex.n}</div>`;
      }else{
        html += `<div class="ex"><div><div class="exn">${ex.n}</div>${ex.note?`<div class="exnote">${ex.note}</div>`:''}</div><div class="exs">${ex.s}</div></div>`;
      }
    });
    html += `</div></div>`;
  }

  // === 注意事项 ===
  html += `<div id="s-rehab" class="hidden"><div class="card"><h3>🩺 康复 & 注意事项</h3>`;
  d.rehab.forEach((r,i)=>{
    html += `<div class="rh"><input type="checkbox" id="rh${i}"><label for="rh${i}">${r}</label></div>`;
  });
  html += `</div>`;
  if(d.tips) html += `<div class="tips">${d.tips}</div>`;
  html += `</div>`; // close s-rehab

  document.getElementById('ct').innerHTML = html;

  // Load checkboxes
  d.rehab.forEach((_,i)=>{
    const cb = document.getElementById('rh'+i);
    if(cb){
      cb.checked = localStorage.getItem(`r-${key}-${i}`)==='true';
      cb.addEventListener('change',()=>localStorage.setItem(`r-${key}-${i}`,cb.checked));
    }
  });

  // Show first tab by default
  showTab('sch');
}

render(getTodayKey());


// ===================== SERVICE WORKER (offline cache) =====================
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/今日安排.html?sw=1').catch(()=>{});
  // Self-caching: register a blob worker that caches this page
  const cacheName = 'today-plan-v1';
  const cachePage = async ()=>{
    const cache = await caches.open(cacheName);
    await cache.add(location.href);
  };
  // Try to cache on first load
  window.addEventListener('load',()=>{
    if(navigator.onLine) cachePage().catch(()=>{});
  });
  // Intercept fetch with the file itself
  if(!navigator.serviceWorker.controller){
    const swCode = `
      const CACHE = 'today-plan-v1';
      self.addEventListener('install',e=>{self.skipWaiting()});
      self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
      self.addEventListener('fetch',e=>{
        if(e.request.url.includes('今日安排')){
          e.respondWith(
            caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{
              return caches.open(CACHE).then(c=>{c.put(e.request,resp.clone());return resp});
            }))
          );
        }
      });
    `;
    const blob = new Blob([swCode],{type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
}
